# Render Blueprint — backend web service + free Key Value (Redis) instance.
# Import at https://dashboard.render.com/blueprints (connect the GitHub repo).
#
# Free-tier drone-photogrammetry topology: the web service also runs an
# embedded RQ worker process (WORKER_EMBEDDED=1) because free plans have no
# background-worker service type; uploads use the backend's local storage
# (ephemeral disk — fine for demo surveys, use S3 for production); NodeODM
# itself must run elsewhere (any machine with CPU/RAM, e.g. exposed through
# a tunnel) and is configured via the NODEODM_URL dashboard variable.
services:
  - type: keyvalue
    name: keyline-redis
    plan: free
    ipAllowList: []  # internal connections only

  - type: web
    name: keyline-backend
    runtime: docker
    rootDir: backend
    plan: free # free tier spins down when idle; first request after idle is slow
    healthCheckPath: /docs
    envVars:
      - key: AWS_NO_SIGN_REQUEST
        value: "YES"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: keyline-redis
          property: connectionString
      - key: WORKER_EMBEDDED
        value: "1"
      - key: STORAGE_BACKEND
        value: local
      - key: PHOTOGRAMMETRY_PROVIDER
        value: nodeodm
      - key: NODEODM_URL
        sync: false # set in the dashboard (points at your processing node)
      - key: NODEODM_TOKEN
        sync: false
      - key: DRONE_MIN_IMAGES
        sync: false # dashboard-tunable; backend default is 20
      # Cap the hydrology/fusion grid so a high-resolution (0.1 m) drone DTM
      # over a whole property is coarsened instead of OOM/stalling the 512 MB
      # free-tier worker (the "Fusing DEM" hang). 1.2M is conservative here.
      - key: ANALYSIS_MAX_GRID_CELLS
        value: "1200000"
